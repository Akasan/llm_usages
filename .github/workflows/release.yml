# Automatic Release Workflow
#
# Triggers when a release PR (branch: release/vX.Y.Z) is merged into main.
# Publishes the crate to crates.io and creates a GitHub Release with auto-generated notes.
#
# Setup:
#   1. Create an API token at https://crates.io/settings/tokens
#   2. Add it as CARGO_REGISTRY_TOKEN in GitHub repo Settings > Secrets and variables > Actions

name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    # Only run when the merge commit message contains "release/v" (i.e. a release PR was merged)
    if: contains(github.event.head_commit.message, 'release/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub Release
        run: gh release create "v${{ steps.version.outputs.version }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
